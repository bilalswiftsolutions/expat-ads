# expat-status.bilalarshad.pro — PHP ad tracker
#
# On the server:
#   1. DNS A record: expat-status.bilalarshad.pro -> server IP
#   2. Clone app to /var/www/expat-status
#   3. Enable this site, then: sudo certbot --nginx -d expat-status.bilalarshad.pro

server {
    listen 80;
    listen [::]:80;
    server_name expat-status.bilalarshad.pro;

    root /var/www/expat-status;
    index index.php;

    access_log /var/log/nginx/expat-status.access.log;
    error_log  /var/log/nginx/expat-status.error.log;

    # Block data directory from web access
    location ^~ /data/ {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        # Adjust PHP-FPM socket if needed (php8.3 / php8.2 / php8.1)
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 180s;
    }

    location ~ /\. {
        deny all;
    }
}
